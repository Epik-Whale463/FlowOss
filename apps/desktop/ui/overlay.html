<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-feature-settings: "cv05", "ss01";
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 4px;
    -webkit-user-select: none; user-select: none; cursor: default;
  }

  /* ---- moonlight glass pill ----
     One idea carried everywhere: the pill is a shard of dark glass and your
     voice is light trapped inside it. Level drives luminance, never color. */
  #pill {
    --level: 0;
    --lum: calc(0.10 + var(--level) * 0.38);           /* outer halo */
    --core: calc(var(--level) * 0.16);                  /* inner light */
    --orb-x: calc(1 + var(--level) * 0.52);
    --orb-y: calc(1 - var(--level) * 0.18);
    position: relative;
    display: flex; align-items: center; gap: 10px;
    background:
      linear-gradient(160deg, rgba(44,46,60,0.66), rgba(9,9,15,0.92) 70%),
      rgba(13,13,20,0.9);
    backdrop-filter: blur(28px) saturate(1.6);
    -webkit-backdrop-filter: blur(28px) saturate(1.6);
    color: #f4f5fb;
    border-radius: 999px;
    padding: 9px 16px;
    min-width: 132px; max-width: 380px;
    justify-content: center;
    box-shadow:
      0 18px 46px rgba(0,0,0,0.58),
      0 0 calc(14px + var(--level) * 30px) rgba(168,182,228, var(--lum)),
      0 0 0 1px rgba(0,0,0,0.32),
      inset 0 1px 0 rgba(255,255,255,0.22),
      inset 0 -1px 0 rgba(255,255,255,0.06),
      inset 0 0 calc(8px + var(--level) * 22px) rgba(184,196,240, var(--core));
    border: 1px solid rgba(255,255,255,0.20);
    overflow: hidden;
    text-shadow: 0 1px 2px rgba(0,0,0,0.48);
    transform-origin: 50% 100%;
    animation: riseIn 320ms cubic-bezier(0.16, 1, 0.3, 1);
    transition:
      opacity 180ms ease,
      min-width 320ms cubic-bezier(0.16, 1, 0.3, 1),
      width 360ms cubic-bezier(0.16, 1, 0.3, 1),
      min-height 360ms cubic-bezier(0.16, 1, 0.3, 1),
      border-radius 360ms cubic-bezier(0.16, 1, 0.3, 1),
      padding 360ms cubic-bezier(0.16, 1, 0.3, 1),
      box-shadow 95ms ease-out;
  }
  /* slow specular drift — the glass feels lit from above */
  #pill::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(115deg,
      transparent 20%, rgba(255,255,255,0.14) 38%,
      rgba(255,255,255,0.05) 48%, transparent 60%);
    background-size: 260% 100%;
    animation: sheen 6.5s ease-in-out infinite;
    pointer-events: none;
  }
  #pill::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(100deg,
      transparent 0%, transparent 34%, rgba(255,255,255,.32) 46%,
      rgba(255,255,255,.08) 52%, transparent 66%, transparent 100%);
    transform: translateX(-130%);
    pointer-events: none; opacity: 0;
  }
  #pill.focus::after { animation: focusLine 520ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  #pill.success-pulse { animation: confidencePulse 620ms cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes sheen { 0%,100% { background-position: 130% 0; } 50% { background-position: -30% 0; } }
  @keyframes riseIn {
    from { transform: translateY(18px) scale(.96); opacity: 0; filter: blur(4px); }
    70%  { transform: translateY(-1px) scale(1.006); opacity: 1; filter: blur(0); }
    to   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }
  @keyframes focusLine {
    0% { opacity: 0; transform: translateX(-130%) skewX(-16deg); }
    18% { opacity: .9; }
    100% { opacity: 0; transform: translateX(130%) skewX(-16deg); }
  }
  /* success: the trapped light escapes as a cool white ring, then settles */
  @keyframes confidencePulse {
    0% { box-shadow: 0 18px 46px rgba(0,0,0,0.58), 0 0 0 rgba(226,232,255,0), 0 0 0 1px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(255,255,255,0.06); }
    38% { box-shadow: 0 20px 52px rgba(0,0,0,0.6), 0 0 38px rgba(226,232,255,.5), 0 0 0 1px rgba(226,232,255,.65), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(226,232,255,.14); }
    100% { box-shadow: 0 18px 46px rgba(0,0,0,0.58), 0 0 0 rgba(226,232,255,0), 0 0 0 1px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(255,255,255,0.06); }
  }
  #pill.hidden { opacity: 0; }
  #pill.answer {
    width: 610px; max-width: 610px; min-height: 300px;
    align-items: stretch; justify-content: flex-start;
    border-radius: 24px; padding: 18px 20px;
    animation: unfoldUp 380ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes unfoldUp {
    from { transform: translateY(14px) scaleX(.72) scaleY(.35); opacity: .4; filter: blur(3px); }
    72%  { transform: translateY(-1px) scaleX(1.01) scaleY(1.01); opacity: 1; filter: blur(0); }
    to   { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }

  /* the only hot color in the system: a live coral ember while recording */
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe0d6, #ff6b5e 48%, #cf3a30);
    flex: none;
    box-shadow: 0 0 calc(10px + var(--level) * 14px) rgba(255,107,94,calc(.5 + var(--level) * .35));
    transform: scaleX(var(--orb-x)) scaleY(var(--orb-y));
    transition: transform 90ms ease-out, box-shadow 90ms ease-out;
  }

  #bars { display: flex; align-items: center; gap: 2.5px; height: 18px; flex: none; }
  #bars span {
    width: 3px; border-radius: 2px;
    background: linear-gradient(180deg, #ffffff, #a9b2d4);
    box-shadow: 0 0 6px rgba(196,206,244, calc(var(--level) * 0.7));
    height: 3px; transition: height 90ms ease-out;
  }

  /* live word stream: right-anchored, newest word slides in */
  #words {
    display: flex; justify-content: flex-end; align-items: baseline;
    overflow: hidden; white-space: nowrap;
    max-width: 250px; font-size: 13px; line-height: 1.3;
    mask-image: linear-gradient(90deg, transparent, black 28px);
    -webkit-mask-image: linear-gradient(90deg, transparent, black 28px);
  }
  #words .w { margin-left: 4px; transform-origin: 50% 100%; }
  #words .w.new { animation: wordMagnet 330ms cubic-bezier(0.14, 1.38, 0.32, 1); }
  @keyframes wordMagnet {
    0%   { opacity: 0; transform: translateY(9px) translateX(8px) scale(.86); filter: blur(2px); }
    58%  { opacity: 1; transform: translateY(-2px) translateX(-1.5px) scale(1.04); filter: blur(0); }
    78%  { transform: translateY(1px) translateX(.8px) scale(.99); }
    100% { opacity: 1; transform: translateY(0) translateX(0) scale(1); filter: blur(0); }
  }
  #words .placeholder { color: #a2a6ba; font-size: 12.5px; }

  #timer { font-size: 11.5px; font-variant-numeric: tabular-nums; color: #b8bccd; flex: none; }

  .spinner {
    width: 13px; height: 13px; flex: none;
    border: 2px solid rgba(255,255,255,0.16); border-top-color: #eef0fa;
    border-radius: 50%; animation: spin 700ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #label {
    font-size: 12.5px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 230px;
  }
  .ok { color: #e6eaff; text-shadow: 0 0 10px rgba(200,212,255,.6); }
  .err { color: #ffada4; }
  .muted { color: #c3c6d6; }
  .ai {
    width: 22px; height: 22px; border-radius: 9px; flex: none;
    display: grid; place-items: center; font-size: 12px; font-weight: 750;
    background: linear-gradient(135deg, #a4b6ff, #dcc8ff); color: #12121c;
    box-shadow: 0 0 18px rgba(178,190,255,.3);
  }
  .answer-card { display: flex; flex-direction: column; gap: 10px; width: 100%; min-width: 0; min-height: 0; animation: cardResolve 300ms ease-out both; }
  @keyframes cardResolve { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .answer-top { display: flex; align-items: center; gap: 9px; color: #dcdee9; font-size: 12px; }
  .answer-query { color: #f4f5fb; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .answer-context {
    color: #d4d6e2; font-size: 11.5px; line-height: 1.35;
    padding: 8px 10px; border-radius: 12px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.11);
    max-height: 48px; overflow: hidden;
  }
  .answer-text {
    color: #f6f7fc; font-size: 14px; line-height: 1.48;
    white-space: pre-wrap; overflow-y: auto; flex: 1; min-height: 0; padding-right: 6px;
    -webkit-user-select: text; user-select: text; cursor: text;
  }
  .answer-text::-webkit-scrollbar { width: 6px; }
  .answer-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,.22); border-radius: 3px; }
  .answer-text::-webkit-scrollbar-track { background: transparent; }

  /* live tool activity while the assistant works */
  .status {
    font-size: 12.5px; color: #cdd1e2;
    background: linear-gradient(90deg, #cdd1e2 30%, #ffffff 50%, #cdd1e2 70%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: statusShimmer 1.6s linear infinite;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  @keyframes statusShimmer { from { background-position: 130% 0; } to { background-position: -70% 0; } }

  .answer-foot {
    display: flex; align-items: center; gap: 6px; min-width: 0;
    padding-top: 2px;
  }
  .chips { display: flex; gap: 6px; min-width: 0; overflow: hidden; flex: 1; }
  .chip {
    font-size: 11px; color: #cfd4e8; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 150px; flex: none;
    padding: 4px 10px; border-radius: 999px; cursor: pointer;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    transition: background 120ms ease, border-color 120ms ease;
  }
  .chip:hover { background: rgba(164,182,255,.18); border-color: rgba(164,182,255,.45); }
  .btn {
    font-size: 12px; font-weight: 600; color: #eef0fa; flex: none;
    padding: 5px 13px; border-radius: 999px; cursor: pointer; border: 1px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.1);
    transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
  }
  .btn:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.3); }
  .btn:active { transform: scale(.96); }
  .btn.quiet { background: none; border-color: rgba(255,255,255,.1); color: #b8bccd; }
  .btn.quiet:hover { color: #eef0fa; border-color: rgba(255,255,255,.24); }

  @media (prefers-reduced-motion: reduce) {
    #pill, #pill::before, #pill::after,
    #pill.focus::after, #pill.success-pulse,
    #words .w.new, .answer-card { animation: none !important; }
  }
</style>
</head>
<body>
  <div id="pill" class="hidden"></div>
<script>
  const pill = document.getElementById("pill");
  const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);
  const BAR_COUNT = 5;
  const BAR_GAIN = [0.6, 0.9, 1.2, 0.9, 0.6];
  let wordCount = 0;
  let lastState = "";

  function setMode(mode) {
    if (pill.dataset.mode === mode) return false;
    pill.dataset.mode = mode;
    pill.classList.remove("focus", "success-pulse");
    void pill.offsetWidth;
    pill.classList.add("focus");
    return true;
  }

  function setLevel(level) {
    const eased = Math.min(1, Math.max(0, level * 9));
    pill.style.setProperty("--level", eased.toFixed(3));
    return eased;
  }

  function confidencePulse() {
    pill.classList.remove("success-pulse");
    void pill.offsetWidth;
    pill.classList.add("success-pulse");
  }

  function renderWords(partial) {
    const box = pill.querySelector("#words");
    if (!box) return;
    const words = partial.trim().split(/\s+/).filter(Boolean);
    if (words.length === 0) {
      if (!box.querySelector(".placeholder")) {
        box.innerHTML = '<span class="placeholder">Listening…</span>';
        wordCount = 0;
      }
      return;
    }
    if (box.querySelector(".placeholder")) { box.innerHTML = ""; wordCount = 0; }
    // Streaming models only append; re-render is cheap, but animate only
    // genuinely new words so the stream feels alive, not flickery.
    if (words.length < wordCount) { box.innerHTML = ""; wordCount = 0; }
    const existing = box.children.length;
    for (let i = existing; i < words.length; i++) {
      const span = document.createElement("span");
      span.className = "w new";
      span.textContent = words[i];
      box.appendChild(span);
    }
    // Correct earlier words if the decoder revised them (no animation).
    for (let i = 0; i < Math.min(existing, words.length); i++) {
      if (box.children[i].textContent !== words[i]) {
        box.children[i].textContent = words[i];
      }
    }
    wordCount = words.length;
  }

  function render(s) {
    pill.classList.remove("hidden");
    pill.classList.remove("answer");
    if (s.state !== lastState) {
      pill.classList.remove("focus", "success-pulse");
    }
    switch (s.state) {
      case "recording": {
        if (setMode("rec")) {
          pill.style.minWidth = "300px";
          pill.innerHTML =
            '<div class="dot"></div><div id="bars">' +
            "<span></span>".repeat(BAR_COUNT) +
            '</div><div id="words"></div><div id="timer">0:00</div>';
          wordCount = 0;
        }
        const bars = pill.querySelectorAll("#bars span");
        const boosted = setLevel(s.level || 0);
        bars.forEach((bar, i) => {
          const jitter = 0.75 + Math.random() * 0.5;
          bar.style.height = Math.min(18, 3 + boosted * BAR_GAIN[i] * jitter * 15) + "px";
        });
        const secs = Math.floor(s.secs);
        pill.querySelector("#timer").textContent =
          Math.floor(secs / 60) + ":" + String(secs % 60).padStart(2, "0");
        renderWords(s.partial ?? "");
        break;
      }
      case "assist-recording": {
        if (setMode("assist-rec")) {
          pill.style.minWidth = "330px";
          pill.innerHTML =
            '<div class="ai">✦</div><div id="bars">' +
            "<span></span>".repeat(BAR_COUNT) +
            '</div><div id="words"></div><div id="timer">0:00</div>';
          wordCount = 0;
        }
        const bars = pill.querySelectorAll("#bars span");
        const boosted = setLevel(s.level || 0);
        bars.forEach((bar, i) => {
          const jitter = 0.75 + Math.random() * 0.5;
          bar.style.height = Math.min(18, 3 + boosted * BAR_GAIN[i] * jitter * 15) + "px";
        });
        const secs = Math.floor(s.secs);
        pill.querySelector("#timer").textContent =
          Math.floor(secs / 60) + ":" + String(secs % 60).padStart(2, "0");
        renderWords(s.partial || "Ask about the selected text");
        break;
      }
      case "processing":
        setMode("proc");
        setLevel(0.18);
        pill.style.minWidth = "132px";
        pill.innerHTML = '<div class="spinner"></div><div id="label" class="muted">Transcribing…</div>';
        break;
      case "assist-processing":
        // First event builds the card; later ones only update the status
        // line so the spinner and layout don't restart on every tick.
        if (setMode("assist-proc")) {
          pill.classList.add("answer");
          pill.innerHTML =
            '<div class="answer-card">' +
            '<div class="answer-top"><div class="ai">✦</div><div>Assist</div></div>' +
            '<div class="answer-query"></div>' +
            '<div style="display:flex;align-items:center;gap:10px"><div class="spinner"></div><div class="status"></div></div>' +
            '</div>';
        } else {
          pill.classList.add("answer");
        }
        setLevel(0.22);
        pill.querySelector(".answer-query").textContent = s.query || "";
        pill.querySelector(".status").textContent = s.status || "Thinking…";
        break;
      case "assist-answer": {
        setMode("assist-answer");
        setLevel(0.12);
        pill.classList.add("answer");
        pill.innerHTML =
          '<div class="answer-card">' +
          '<div class="answer-top"><div class="ai">✦</div><div>Answer</div></div>' +
          '<div class="answer-query"></div>' +
          '<div class="answer-context"></div>' +
          '<div class="answer-text"></div>' +
          '<div class="answer-foot"><div class="chips"></div>' +
          '<div class="btn" id="copyAnswer">Copy</div>' +
          '<div class="btn quiet" id="closeAnswer">✕</div></div>' +
          '</div>';
        pill.querySelector(".answer-query").textContent = s.query || "";
        pill.querySelector(".answer-context").textContent = s.context_preview || "";
        pill.querySelector(".answer-text").textContent = s.answer || "";
        const chips = pill.querySelector(".chips");
        for (const src of (s.sources || []).slice(0, 4)) {
          const chip = document.createElement("div");
          chip.className = "chip";
          chip.textContent = src.title || src.url;
          chip.title = src.url;
          chip.addEventListener("click", () =>
            invoke("open_url", { url: src.url }).catch((e) => log("open_url: " + e)));
          chips.appendChild(chip);
        }
        const copy = pill.querySelector("#copyAnswer");
        copy.addEventListener("click", () => {
          invoke("copy_text", { text: s.answer || "" })
            .then(() => { copy.textContent = "Copied ✓"; })
            .catch((e) => log("copy_text: " + e));
        });
        pill.querySelector("#closeAnswer").addEventListener("click", () =>
          invoke("dismiss_overlay").catch((e) => log("dismiss: " + e)));
        break;
      }
      case "success":
        setMode("done");
        setLevel(0.1);
        pill.style.minWidth = "132px";
        pill.innerHTML =
          '<div id="label"><span class="ok">✓</span> ' +
          (s.pasted ? "Pasted" : "Copied — press Ctrl+V") +
          "</div>";
        confidencePulse();
        break;
      case "no-speech":
        setMode("done");
        setLevel(0);
        pill.style.minWidth = "132px";
        pill.innerHTML = '<div id="label" class="muted">No speech detected</div>';
        break;
      case "error":
        setMode("done");
        setLevel(0);
        pill.innerHTML = '<div id="label" class="err"></div>';
        pill.querySelector("#label").textContent = "⚠ " + s.message;
        break;
      case "loading":
        setMode("load");
        setLevel(0.1);
        pill.innerHTML = '<div class="spinner"></div><div id="label" class="muted">Loading model…</div>';
        break;
      default:
        pill.dataset.mode = "";
        setLevel(0);
        pill.classList.add("hidden");
    }
    lastState = s.state || "";
  }

  // Hovering the answer card pins it open; leaving starts a short countdown.
  pill.addEventListener("mouseenter", () => {
    if (pill.dataset.mode === "assist-answer")
      invoke("assist_hover", { hovering: true }).catch(() => {});
  });
  pill.addEventListener("mouseleave", () => {
    if (pill.dataset.mode === "assist-answer")
      invoke("assist_hover", { hovering: false }).catch(() => {});
  });

  const log = (message) =>
    window.__TAURI__.core.invoke("ui_log", { message }).catch(() => {});
  window.addEventListener("unhandledrejection", (e) => log("overlay rejection: " + e.reason));
  window.__TAURI__.event
    .listen("flowoss://state", (e) => render(e.payload))
    .then(() => log("overlay listening"))
    .catch((err) => log("overlay listen failed: " + err));
</script>
</body>
</html>
