<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    overflow: hidden;
    width: 100%; height: 100%;
  }
  body {
    font-family: system-ui, -apple-system, "Segoe UI Variable", "Segoe UI", sans-serif;
    -webkit-user-select: none; user-select: none; cursor: default;
    /* No padding — the window IS the pill. Padding creates a dark rectangular box. */
  }

  :root {
    --spring: cubic-bezier(0.22, 1.28, 0.36, 1);
    --spring-soft: cubic-bezier(0.25, 1.1, 0.4, 1);
    --spring-out: cubic-bezier(0.4, 0, 0.2, 1);
    --dur-enter: 460ms;
    --dur-morph: 500ms;
    --dur-exit: 340ms;
    --dur-settle: 400ms;
    --edge-soft: rgba(255, 255, 255, 0.18);
    --ink: #f4f5f8;
    --muted: #9aa0ae;
    /* Chrome rim: lit from above so the edge reads as a 3D metal lip */
    --rim: linear-gradient(180deg,
      #f5f7fb 0%,
      #d8dce4 22%,
      #9aa0aa 48%,
      #5c6068 74%,
      #c6cad2 100%);
  }

  /*
   * 3D black capsule — ONE element, fills the transparent window.
   * NEVER use outer box-shadow / filter drop-shadow: WebView composites
   * those as a black rectangle on transparent windows.
   * Depth is inset-only + gradient body + chrome rim.
   *
   * DOM: body > #pill > (#wave | #card)  — nothing else.
   */
  #pill {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 999px;
    border: 1.5px solid transparent;
    background-image:
      linear-gradient(180deg,
        #1a1b20 0%,
        #0e0e11 40%,
        #070708 72%,
        #050506 100%),
      radial-gradient(130% 90% at 50% 50%,
        transparent 48%,
        rgba(0, 0, 0, .28) 100%),
      var(--rim);
    background-origin: border-box;
    background-clip: padding-box, padding-box, border-box;
    /* INSET ONLY — zero outer shadows, no top white shine */
    box-shadow:
      inset 0 -4px 8px rgba(0, 0, 0, .50),
      inset 3px 0 6px rgba(0, 0, 0, .16),
      inset -3px 0 6px rgba(0, 0, 0, .16);
    color: var(--ink);
    overflow: hidden;
    transform-origin: 50% 0%;
    will-change: transform, opacity, border-radius;
    transition:
      opacity 150ms var(--spring-out),
      border-radius var(--dur-morph) var(--spring);
  }
  #pill.hidden { opacity: 0; pointer-events: none; }

  /* No specular / white shine band */
  #pill::before { content: none; }

  /* Thin inner edge only — no bright top lip */
  #pill::after {
    content: "";
    position: absolute;
    inset: 1.5px;
    border-radius: inherit;
    border: 1px solid rgba(255, 255, 255, .10);
    pointer-events: none;
    z-index: 4;
  }

  #pill.enter { animation: condense var(--dur-enter) var(--spring) both; }
  @keyframes condense {
    0%   { transform: translateY(-10px) scale3d(.55, .8, 1); opacity: 0; }
    60%  { transform: translateY(1px) scale3d(1.03, 1.04, 1); opacity: 1; }
    100% { transform: none; opacity: 1; }
  }

  #pill.err {
    background-image:
      linear-gradient(180deg, #2a181c 0%, #140a0c 42%, #080506 100%),
      radial-gradient(130% 90% at 50% 50%, transparent 48%, rgba(0, 0, 0, .28) 100%),
      linear-gradient(180deg, #ffd0d6 0%, #e09098 30%, #804048 70%, #e8a8b0 100%);
    animation: settle var(--dur-settle) var(--spring-soft) both;
  }
  @keyframes settle {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-2.5px); }
    45%  { transform: translateX(1.8px); }
    70%  { transform: translateX(-0.8px); }
    100% { transform: none; }
  }

  #pill.ok {
    background-image:
      linear-gradient(180deg, #1a2622 0%, #0a100e 42%, #050806 100%),
      radial-gradient(130% 90% at 50% 50%, transparent 48%, rgba(0, 0, 0, .28) 100%),
      linear-gradient(180deg, #e8fff4 0%, #a0d8c0 30%, #406858 70%, #c0e8d4 100%);
    animation: exhale var(--dur-exit) var(--spring-out) 1100ms forwards;
  }
  @keyframes exhale {
    to { transform: translateY(-6px) scale3d(.94, .94, 1); opacity: 0; }
  }

  #wave {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
    border-radius: inherit;
  }

  /* ── Assist card: same 3D material, flattened into a thick rounded plate ── */
  #card {
    display: none;
    position: relative;
    z-index: 5;
    flex-direction: column;
    width: 100%; height: 100%;
    min-height: 0;
  }
  #pill.panel {
    border-radius: 22px;
    padding: 0;
    background-image:
      linear-gradient(165deg, #1a1b20 0%, #0c0c0e 45%, #060607 100%),
      radial-gradient(130% 90% at 50% 50%,
        transparent 48%,
        rgba(0, 0, 0, .22) 100%),
      var(--rim);
    background-origin: border-box;
    background-clip: padding-box, padding-box, border-box;
    /* INSET ONLY — no outer shadow, no top shine */
    box-shadow:
      inset 0 -4px 10px rgba(0, 0, 0, .5),
      inset 3px 0 6px rgba(0, 0, 0, .14),
      inset -3px 0 6px rgba(0, 0, 0, .14);
    display: flex;
    align-items: stretch;
    animation: unfold var(--dur-morph) var(--spring) both;
  }
  #pill.panel::after {
    inset: 1.5px;
    border-radius: 20.5px;
  }
  #pill.panel #wave { display: none; }
  #pill.panel #card { display: flex; }

  @keyframes unfold {
    0%   { transform: translateY(-8px) scaleX(.85) scaleY(.5); opacity: .4; }
    58%  { transform: translateY(1px) scale(1.01); opacity: 1; }
    100% { transform: none; opacity: 1; }
  }

  .stag { animation: rise 400ms var(--spring) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  /* Header: title left, action right */
  .head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 0;
    min-width: 0;
    flex: none;
  }
  .head-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .title {
    color: var(--ink);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .subtitle:empty { display: none; }

  /* Thinking state: centered compact block */
  #card.thinking {
    justify-content: center;
    padding: 18px 20px;
    gap: 8px;
  }
  #card.thinking .head {
    padding: 0;
  }
  .status-line {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #c8c4ff;
    box-shadow: 0 0 0 0 rgba(200, 196, 255, .45);
    flex: none;
    animation: pulse 1.4s var(--spring-out) infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(200, 196, 255, .45); opacity: 1; }
    70%  { box-shadow: 0 0 0 8px rgba(200, 196, 255, 0); opacity: .85; }
    100% { box-shadow: 0 0 0 0 rgba(200, 196, 255, 0); opacity: 1; }
  }
  .status-text {
    font-size: 13.5px;
    font-weight: 550;
    color: var(--ink);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status-text.shimmer {
    background: linear-gradient(90deg, #8a8e9c 30%, #f0f1f5 50%, #8a8e9c 70%);
    background-size: 200% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 1.8s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 120% 0; }
    to   { background-position: -40% 0; }
  }
  .query-muted {
    color: var(--muted);
    font-size: 12.5px;
    padding-left: 18px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Answer body */
  .body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 16px 0;
    overflow: hidden;
  }
  .ctx {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.4;
    padding: 0 0 2px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding-bottom: 10px;
    max-height: 52px;
    overflow: hidden;
    flex: none;
  }
  .ctx:empty { display: none; }

  .ans {
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    padding-right: 4px;
    -webkit-user-select: text; user-select: text;
    cursor: text;
  }
  .ans.reveal {
    -webkit-mask-image: linear-gradient(100deg, #000 48%, transparent 62%);
            mask-image: linear-gradient(100deg, #000 48%, transparent 62%);
    -webkit-mask-size: 260% 100%; mask-size: 260% 100%;
    animation: wipe 640ms var(--spring-out) forwards;
  }
  @keyframes wipe {
    from { -webkit-mask-position: 130% 0; mask-position: 130% 0; }
    to   { -webkit-mask-position: 0 0; mask-position: 0 0; }
  }
  .ans::-webkit-scrollbar { width: 5px; }
  .ans::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.18);
    border-radius: 3px;
  }
  .ans::-webkit-scrollbar-track { background: transparent; }

  /* Footer: sources left, primary action right */
  .foot {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: none;
    padding: 12px 16px 14px;
    border-top: 1px solid rgba(255,255,255,.08);
    margin-top: 4px;
  }
  .chips {
    display: flex;
    gap: 6px;
    min-width: 0;
    overflow: hidden;
    flex: 1;
  }
  .chip {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
    flex: none;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    background: transparent;
    border: 1px solid rgba(255,255,255,.16);
    transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    animation: pop 360ms var(--spring) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: none; }
  }
  .chip:hover {
    color: var(--ink);
    border-color: rgba(255,255,255,.35);
    background: rgba(255,255,255,.06);
  }

  .btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    flex: none;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid var(--edge-soft);
    background: rgba(255,255,255,.08);
    transition: background 120ms ease, border-color 120ms ease, transform 100ms ease, color 160ms ease;
  }
  .btn:hover {
    background: rgba(255,255,255,.14);
    border-color: rgba(255,255,255,.35);
  }
  .btn:active { transform: scale(.96); }
  .btn.done {
    color: #b6f0cc;
    border-color: rgba(150, 230, 185, .4);
    background: rgba(100, 210, 150, .1);
  }
  .btn.icon {
    width: 28px; height: 28px;
    padding: 0;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
  }
  .btn.icon:hover {
    color: var(--ink);
    background: rgba(255,255,255,.08);
    border-color: rgba(255,255,255,.12);
  }

  @media (prefers-reduced-motion: reduce) {
    #pill, #pill.enter, #pill.ok, #pill.err, .stag, .chip,
    .status-text.shimmer, .ans.reveal, #pill.panel, .pulse {
      animation: none !important;
    }
    .ans.reveal { -webkit-mask-image: none; mask-image: none; }
  }
</style>
</head>
<body>
  <div id="pill" class="hidden" data-mode="">
    <canvas id="wave"></canvas>
    <div id="card"></div>
  </div>
<script>
"use strict";
const TAURI = window.__TAURI__;
const invoke = (cmd, args) => TAURI ? TAURI.core.invoke(cmd, args) : Promise.resolve();
const log = (message) => invoke("ui_log", { message }).catch(() => {});
const pill = document.getElementById("pill");
const wave = document.getElementById("wave");
const card = document.getElementById("card");
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

const TINT = {
  rec:    [150, 190, 255],
  assist: [190, 160, 255],
  ok:     [140, 235, 200],
  err:    [255, 120, 140],
  mute:   [190, 196, 210],
};
const rgba = (c, a) => `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
const now = () => performance.now() / 1000;
window.__LIQ = [];

function LiquidGlass(canvas) {
  const ctx = canvas.getContext("2d");
  const R = {
    raf: 0, prev: 0,
    level: 0, vel: 0, target: 0,
    fill: 0.42, fv: 0, fillT: 0.42,
    tint: [...TINT.rec], want: TINT.rec,
    impulse: 0, bloomAt: -1,
    kind: "recording",
    active: false,
  };
  window.__LIQ.push(R);

  function set(opts) {
    if (opts.tint) R.want = opts.tint;
    if (opts.fill !== undefined) R.fillT = opts.fill;
    if (opts.kind) R.kind = opts.kind;
    if (opts.kick) R.impulse = Math.min(1.6, R.impulse + opts.kick);
    if (opts.bloom) R.bloomAt = now();
    if (!R.active) R.active = true;
    startLoop();
  }
  function setLevel(raw) { R.target = Math.min(1, Math.max(0, raw * 9)); }
  function off() {
    R.active = false; R.bloomAt = -1; R.impulse = 0;
    stopLoop();
  }

  function startLoop() {
    if (REDUCED) { drawStill(); return; }
    if (R.raf) return;
    R.prev = now();
    R.raf = requestAnimationFrame(frame);
  }
  function stopLoop() {
    if (R.raf) cancelAnimationFrame(R.raf);
    R.raf = 0;
  }

  function frame() {
    R.raf = requestAnimationFrame(frame);
    const t = now(), dt = Math.min(0.05, t - R.prev);
    R.prev = t;
    const k = R.target > R.level ? 200 : 72;
    const damp = R.target > R.level ? 14 : 11;
    R.vel += (R.target - R.level) * k * dt;
    R.vel *= Math.exp(-damp * dt);
    R.level = Math.max(0, R.level + R.vel * dt);
    R.fv += (R.fillT - R.fill) * 48 * dt;
    R.fv *= Math.exp(-10 * dt);
    R.fill = Math.max(0, Math.min(1, R.fill + R.fv * dt));
    R.impulse *= Math.exp(-2.8 * dt);
    for (let i = 0; i < 3; i++) {
      R.tint[i] += (R.want[i] - R.tint[i]) * Math.min(1, 8 * dt);
    }
    draw(t);
  }

  function fit() {
    const w = canvas.clientWidth, h = canvas.clientHeight, dpr = devicePixelRatio || 1;
    if (!w || !h) return null;
    if (canvas.width !== (w * dpr | 0) || canvas.height !== (h * dpr | 0)) {
      canvas.width = w * dpr | 0; canvas.height = h * dpr | 0;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w, h };
  }

  function clip(w, h) {
    const r = Math.max(2, Math.min(h, w) / 2);
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, r);
    ctx.clip();
  }

  function drawWaveform(t, w, h) {
    const count = w > h * 1.5 ? 9 : 3;
    const gap = Math.max(2.2, Math.min(4, w / 22));
    const barW = Math.max(1.6, Math.min(2.5, (w * .42 - gap * (count - 1)) / count));
    const total = count * barW + (count - 1) * gap;
    const kick = R.impulse * .18;
    for (let i = 0; i < count; i++) {
      const centerBias = 1 - Math.abs(i - (count - 1) / 2) / Math.max(1, count / 2);
      const live = .22 + R.level * (.56 + centerBias * .28) + kick * centerBias;
      const idle = .14 + .06 * Math.sin(t * 2.0 + i * .72);
      const height = Math.max(2.2, h * Math.min(.64, live + idle * (1 - R.level)));
      const x = (w - total) / 2 + i * (barW + gap);
      const y = (h - height) / 2;
      ctx.fillStyle = `rgba(255,255,255,${.65 + centerBias * .2 + R.level * .1})`;
      ctx.shadowColor = rgba(R.tint, .4);
      ctx.shadowBlur = 3 + R.level * 4;
      ctx.beginPath(); ctx.roundRect(x, y, barW, height, barW); ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawProgress(t, w, h) {
    const count = w > h * 1.5 ? 3 : 2;
    for (let i = 0; i < count; i++) {
      const phase = (t * .68 + i / count) % 1;
      const x = w * (.35 + phase * .30);
      const scale = .65 + Math.sin(phase * Math.PI) * .5;
      ctx.fillStyle = `rgba(255,255,255,${.32 + scale * .4})`;
      ctx.beginPath();
      ctx.arc(x, h / 2, Math.max(1.2, h * .055 * scale), 0, 7);
      ctx.fill();
    }
    if (R.kind === "download") {
      const x0 = h * .5, width = w - h;
      ctx.fillStyle = "rgba(255,255,255,.1)";
      ctx.beginPath(); ctx.roundRect(x0, h - 5, width, 1.5, 1); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.beginPath(); ctx.roundRect(x0, h - 5, width * R.fill, 1.5, 1); ctx.fill();
    }
  }

  function drawMark(w, h, kind) {
    const cx = w / 2, cy = h / 2;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.strokeStyle = "rgba(255,255,255,.92)";
    ctx.fillStyle = "rgba(255,255,255,.92)";
    if (kind === "success" || kind === "answer") {
      ctx.lineWidth = Math.max(1.7, h * .065);
      ctx.beginPath();
      ctx.moveTo(cx - h * .19, cy);
      ctx.lineTo(cx - h * .045, cy + h * .13);
      ctx.lineTo(cx + h * .23, cy - h * .16);
      ctx.stroke();
    } else if (kind === "error") {
      ctx.lineWidth = Math.max(1.8, h * .065);
      ctx.beginPath();
      ctx.moveTo(cx, cy - h * .18);
      ctx.lineTo(cx, cy + h * .05);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy + h * .20, Math.max(1, h * .035), 0, 7);
      ctx.fill();
    } else {
      ctx.lineWidth = Math.max(1.7, h * .06);
      ctx.beginPath();
      ctx.moveTo(cx - h * .13, cy);
      ctx.lineTo(cx + h * .13, cy);
      ctx.stroke();
    }
  }

  function draw(t) {
    const s = fit(); if (!s) return;
    const { w, h } = s;
    const cx = w / 2, cy = h / 2;
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    clip(w, h);

    // Soft activity glow only — never a filled rectangle behind the shape.
    if (R.level > 0.02 || R.impulse > 0.02) {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * .45);
      g.addColorStop(0, rgba(R.tint, .08 + R.level * .05));
      g.addColorStop(1, rgba(R.tint, 0));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    if (R.kind === "recording" || R.kind === "assist-recording") drawWaveform(t, w, h);
    else if (R.kind === "processing" || R.kind === "loading" || R.kind === "download") drawProgress(t, w, h);
    else drawMark(w, h, R.kind);

    if (R.bloomAt >= 0) {
      const k = Math.min(1, (t - R.bloomAt) / 0.5);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, h * (0.3 + (1 - Math.pow(1 - k, 3)) * 1.4));
      g.addColorStop(0, `rgba(255,255,255,${.32 * (1 - k)})`);
      g.addColorStop(1, rgba(R.tint, 0));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }
    ctx.restore();
  }

  function drawStill() { draw(0); }
  return { set, setLevel, off };
}

const orb = LiquidGlass(wave);

let lastState = "";

function setMode(mode) {
  const changed = pill.dataset.mode !== mode;
  pill.dataset.mode = mode;
  pill.classList.toggle("panel", mode === "assist-proc" || mode === "answer");
  return changed;
}

function playEnter() {
  if (REDUCED) return;
  pill.classList.remove("enter");
  void pill.offsetWidth;
  pill.classList.add("enter");
}

function render(s) {
  const appearing = pill.classList.contains("hidden");
  pill.classList.remove("hidden");
  if (s.state !== lastState) pill.classList.remove("ok", "err");
  if (appearing) playEnter();

  switch (s.state) {
    case "recording":
    case "assist-recording": {
      const assist = s.state === "assist-recording";
      setMode(assist ? "assist-rec" : "rec");
      card.innerHTML = "";
      card.className = "";
      orb.setLevel(s.level || 0);
      orb.set({
        tint: assist ? TINT.assist : TINT.rec,
        fill: 0.52 + (s.level || 0) * 2,
        kind: assist ? "assist-recording" : "recording",
      });
      break;
    }
    case "processing":
      setMode("proc");
      card.innerHTML = "";
      orb.set({ tint: TINT.rec, fill: 0.5, kind: "processing" });
      break;
    case "success":
      setMode("success");
      card.innerHTML = "";
      orb.set({ tint: TINT.ok, fill: 1, kind: "success", bloom: true });
      pill.classList.add("ok");
      break;
    case "no-speech":
      setMode("nospeech");
      card.innerHTML = "";
      orb.set({ tint: TINT.mute, fill: 0, kind: "no-speech" });
      break;
    case "error":
      setMode("error");
      card.innerHTML = "";
      orb.set({ tint: TINT.err, fill: 0.42, kind: "error", kick: 1.2 });
      pill.classList.add("err");
      break;
    case "loading":
      setMode("load");
      card.innerHTML = "";
      orb.set({ tint: TINT.mute, fill: 0.45, kind: "loading" });
      break;
    case "downloading":
      setMode("load");
      card.innerHTML = "";
      orb.set({
        tint: TINT.mute,
        fill: Math.max(0.06, (s.pct || 0) / 100),
        kind: "download",
      });
      break;

    case "assist-processing": {
      // Compact thinking card — pulse + status + muted query. No orb.
      if (setMode("assist-proc")) {
        orb.off();
        card.className = "thinking";
        card.innerHTML =
          '<div class="status-line stag">' +
            '<span class="pulse" aria-hidden="true"></span>' +
            '<span class="status-text shimmer"></span>' +
          '</div>' +
          '<div class="query-muted stag" style="animation-delay:40ms"></div>';
      }
      card.querySelector(".status-text").textContent = s.status || "Thinking…";
      card.querySelector(".query-muted").textContent = s.query || "";
      break;
    }

    case "assist-answer": {
      // Clean stack: header → body (ctx + answer) → footer (chips + copy)
      const wasAnswer = lastState === "assist-answer";
      setMode("answer");
      if (!wasAnswer) {
        orb.off();
        card.className = "";
        card.innerHTML =
          '<div class="head stag">' +
            '<div class="head-main">' +
              '<div class="title"></div>' +
            '</div>' +
            '<div class="btn icon" id="closeAnswer" title="Close">✕</div>' +
          '</div>' +
          '<div class="body stag" style="animation-delay:40ms">' +
            '<div class="ctx"></div>' +
            '<div class="ans"></div>' +
          '</div>' +
          '<div class="foot stag" style="animation-delay:80ms">' +
            '<div class="chips"></div>' +
            '<div class="btn" id="copyAnswer">Copy</div>' +
          '</div>';

        card.querySelector(".title").textContent = s.query || "Answer";
        card.querySelector(".ctx").textContent = s.context_preview || "";
        const ans = card.querySelector(".ans");
        ans.textContent = s.answer || "";
        ans.classList.add("reveal");

        const chips = card.querySelector(".chips");
        (s.sources || []).slice(0, 4).forEach((src, i) => {
          const chip = document.createElement("div");
          chip.className = "chip";
          chip.style.animationDelay = 120 + i * 45 + "ms";
          chip.textContent = src.title || src.url;
          chip.title = src.url;
          chip.addEventListener("click", () =>
            invoke("open_url", { url: src.url }).catch((e) => log("open_url: " + e)));
          chips.appendChild(chip);
        });

        const copy = card.querySelector("#copyAnswer");
        copy.addEventListener("click", () => {
          invoke("copy_text", { text: s.answer || "" })
            .then(() => { copy.textContent = "Copied"; copy.classList.add("done"); })
            .catch((e) => log("copy_text: " + e));
        });
        card.querySelector("#closeAnswer").addEventListener("click", () =>
          invoke("dismiss_overlay").catch((e) => log("dismiss: " + e)));
      }
      break;
    }

    default:
      setMode("");
      orb.off();
      card.innerHTML = "";
      pill.classList.add("hidden");
  }
  lastState = s.state || "";
}

pill.addEventListener("mouseenter", () => {
  if (pill.dataset.mode === "answer")
    invoke("assist_hover", { hovering: true }).catch(() => {});
});
pill.addEventListener("mouseleave", () => {
  if (pill.dataset.mode === "answer")
    invoke("assist_hover", { hovering: false }).catch(() => {});
});

window.addEventListener("unhandledrejection", (e) => log("overlay rejection: " + e.reason));
if (TAURI) {
  TAURI.event
    .listen("flowoss://state", (e) => render(e.payload))
    .then(() => log("overlay listening"))
    .catch((err) => log("overlay listen failed: " + err));
} else {
  const state = new URLSearchParams(location.search).get("preview") || "recording";
  const sample = {
    state,
    level: .34,
    secs: 1,
    pct: 64,
    query: "Make this more concise",
    status: "Thinking…",
    answer: "A clear, concise answer rendered above the content layer.",
    context_preview: "Selected text appears here as context.",
    sources: [
      { title: "Source one", url: "https://example.com/1" },
      { title: "Source two", url: "https://example.com/2" },
    ],
  };
  render(sample);
  if (state === "recording" || state === "assist-recording") {
    let phase = 0;
    setInterval(() => render({ ...sample, level: .18 + (Math.sin(phase += .22) + 1) * .18 }), 80);
  }
}
</script>
</body>
</html>
